<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kandel Tech Solutions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background:#0b1224;
  color:#fff;
}

/* NAV */
.navbar { background:rgba(0,0,0,0.7); }

/* HERO SLIDER */
.hero {
  padding:120px;
  text-align:center;
  background-size:cover;
  background-position:center;
  animation: slide 20s infinite;
}

@keyframes slide {
  0% {background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('hero.jpg');}
  25% {background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('hero2.jpg');}
  50% {background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('hero3.jpg');}
  75% {background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('hero4.jpg');}
  100% {background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('hero5.jpg');}
}

.btn-main {
  background:#ffd166;
  border:none;
  padding:10px 25px;
  border-radius:30px;
}

.section { padding:80px 0; }

.glass {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
}

#protectedContent { display:none; }
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">Kandel<span style="color:#ffd166;">Tech</span></a>
<div class="ms-auto">
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>
</div>
</nav>

<!-- LOGIN -->

<section class="text-center p-5">
<h2>Client Login</h2>

<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button onclick="signup()" class="btn btn-main">Sign Up</button> <button onclick="login()" class="btn btn-warning">Login</button> <button onclick="googleLogin()" class="btn btn-light">Google</button>

<p id="userStatus"></p>
</section>

<!-- PROTECTED CONTENT -->

<div id="protectedContent">

<!-- HERO -->

<section class="hero">
<h1>We Build Scalable Digital Solutions</h1>
<p>Web • Cloud • Software</p>
</section>

<!-- SERVICES -->

<section class="section text-center">
<div class="container">
<h2>Services</h2>

<div class="row mt-4">
<div class="col-md-4">
<div class="glass">
<i class="bi bi-code-slash fs-2"></i>
<h5>Web Development</h5>
<p>Modern full-stack apps</p>
</div>
</div>

<div class="col-md-4">
<div class="glass">
<i class="bi bi-cloud fs-2"></i>
<h5>Cloud Solutions</h5>
<p>AWS • Azure • Docker</p>
</div>
</div>

<div class="col-md-4">
<div class="glass">
<i class="bi bi-cpu fs-2"></i>
<h5>Custom Software</h5>
<p>Business automation</p>
</div>
</div>
</div>

</div>
</section>

<!-- CONTACT FORM -->

<section class="section text-center">
<div class="container">
<h2>Start Your Project</h2>

<form id="contactForm" class="bg-dark p-4 rounded">
<input name="name" class="form-control mb-3" placeholder="Full Name" required>
<input name="email" class="form-control mb-3" placeholder="Email Address" required>
<textarea name="message" class="form-control mb-3" placeholder="Project Details" required></textarea>

<button class="btn btn-main w-100">Send Request</button>

</form>

<p id="formStatus"></p>
</div>
</section>

</div>

<!-- FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJaZpIoH-eRXYQeoOOuT-EF4KUVBXMN_I",
  authDomain: "kandel-tech.firebaseapp.com",
  projectId: "kandel-tech"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = () => createUserWithEmailAndPassword(auth,email.value,password.value).catch(e=>alert(e.message));
window.login = () => signInWithEmailAndPassword(auth,email.value,password.value).catch(e=>alert(e.message));
window.googleLogin = () => signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>alert(e.message));
window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  document.getElementById("protectedContent").style.display = user ? "block" : "none";
  document.getElementById("userStatus").innerHTML = user ? "Logged in: "+user.email : "Please login";
});

// FORM SUBMIT
document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  const data = new FormData(this);

  const res = await fetch("https://formspree.io/f/mnjlkrwy", {
    method:"POST",
    body:data,
    headers:{ 'Accept':'application/json' }
  });

  if(res.ok){
    formStatus.innerHTML="✅ Message sent!";
    this.reset();
  } else {
    formStatus.innerHTML="❌ Error sending";
  }
});
</script>

</body>
</html>
