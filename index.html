<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kandel Tech Solutions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg,#060b18,#0b1224);
  color: #fff;
}

.navbar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
}

.hero {
  padding: 120px 0;
  text-align: center;
  background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)), url('hero.jpg') center/cover;
}

.glass {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 25px;
}

input {
  margin-bottom:10px;
}

.hidden {
  display:none;
}

.error {
  color:#ff6b6b;
  font-size:14px;
}

.success {
  color:#4ade80;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold">Kandel<span style="color:#ffd166;">Tech</span></a>

<div class="ms-auto">
<button id="loginBtn" class="btn btn-outline-light btn-sm">Login</button>
<button id="logoutBtn" class="btn btn-danger btn-sm hidden">Logout</button>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container">
<h1>We Build Scalable Digital Solutions</h1>
<p>Web • Cloud • Software</p>
</div>
</section>

<!-- LOGIN MODAL -->
<div id="authBox" class="container text-center mt-5 hidden">
<div class="glass mx-auto" style="max-width:400px;">
<h4>Client Login</h4>

<input type="email" id="email" placeholder="Email" class="form-control">
<input type="password" id="password" placeholder="Password" class="form-control">

<div id="errorMsg" class="error"></div>

<button onclick="signup()" class="btn btn-warning w-100 mt-2">Create Account</button>
<button onclick="login()" class="btn btn-main w-100 mt-2">Login</button>
<button onclick="googleLogin()" class="btn btn-light w-100 mt-2">Google Login</button>

<p id="userStatus" class="mt-2"></p>

<p onclick="closeAuth()" style="cursor:pointer;color:#aaa;">Close</p>
</div>
</div>

<!-- CONTACT -->
<section class="container mt-5">
<h2 class="text-center">Contact Us</h2>

<div class="glass mx-auto" style="max-width:500px;">

<form id="contactForm" action="https://formspree.io/f/mnjlkrwy" method="POST">

<input type="text" name="name" placeholder="Your Name" required class="form-control">
<input type="email" name="email" placeholder="Your Email" required class="form-control">
<textarea name="message" placeholder="Message" required class="form-control"></textarea>

<button type="submit" class="btn btn-warning w-100 mt-2">Send Message</button>

</form>

<p id="formMsg" class="mt-2"></p>

<!-- optional -->
<p class="text-muted small mt-2">You can send without login OR login for priority response</p>

</div>
</section>

<footer class="text-center mt-5 mb-3">
© 2026 Kandel Tech
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  sendEmailVerification,
  signOut
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJaZpIoH-eRXYQeoOOuT-EF4KUVBXMN_I",
  authDomain: "kandel-tech.firebaseapp.com",
  projectId: "kandel-tech",
  storageBucket: "kandel-tech.firebasestorage.app",
  messagingSenderId: "578685445781",
  appId: "1:578685445781:web:6d8be75c8cfd16e88b9d9c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const errorBox = document.getElementById("errorMsg");

function showError(msg){
  errorBox.innerText = msg;
}

function clearError(){
  errorBox.innerText = "";
}

// SIGNUP
window.signup = async function () {
  clearError();
  const email = emailInput.value;
  const password = passwordInput.value;

  if(!email.includes("@")){
    return showError("Enter valid email");
  }

  try {
    const userCred = await createUserWithEmailAndPassword(auth,email,password);
    await sendEmailVerification(userCred.user);
    showError("Verification email sent ✔");
  } catch(e){
    showError(e.message);
  }
};

// LOGIN
window.login = async function () {
  clearError();
  try{
    const userCred = await signInWithEmailAndPassword(auth,email.value,password.value);

    if(!userCred.user.emailVerified){
      showError("Verify email first");
      return;
    }

  }catch(e){
    showError(e.message);
  }
};

// GOOGLE
window.googleLogin = async function(){
  const provider = new GoogleAuthProvider();
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    showError(e.message);
  }
};

// LOGOUT
document.getElementById("logoutBtn").onclick = () => signOut(auth);

// USER STATE
onAuthStateChanged(auth,user=>{
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const status = document.getElementById("userStatus");

  if(user){
    loginBtn.classList.add("hidden");
    logoutBtn.classList.remove("hidden");
    status.innerText = "Logged in";
  } else {
    loginBtn.classList.remove("hidden");
    logoutBtn.classList.add("hidden");
    status.innerText = "";
  }
});

// UI
document.getElementById("loginBtn").onclick = () => {
  document.getElementById("authBox").classList.remove("hidden");
};

window.closeAuth = () => {
  document.getElementById("authBox").classList.add("hidden");
};

// FORM
const form = document.getElementById("contactForm");
const formMsg = document.getElementById("formMsg");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const user = auth.currentUser;

  // OPTIONAL LOGIN REQUIREMENT
  // uncomment below if you want login required

  /*
  if(!user){
    formMsg.innerText = "Login required to send message";
    return;
  }
  */

  const data = new FormData(form);

  const res = await fetch(form.action,{
    method:"POST",
    body:data,
    headers:{ 'Accept': 'application/json' }
  });

  if(res.ok){
    formMsg.innerText = "Message sent successfully ✔";
    form.reset();
  } else {
    formMsg.innerText = "Error sending message";
  }
});
</script>

</body>
</html>
