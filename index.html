<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kandel Tech Solutions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background:#060b18;
  color:#fff;
}

.navbar {
  background: rgba(0,0,0,0.7);
}

.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)), url('hero.jpg');
  background-size:cover;
}

.hero h1 {
  font-size:3rem;
  font-weight:700;
}

.section { padding:70px 0; }

.glass {
  background: rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
}

.btn-main {
  background:#ffc107;
  border:none;
  border-radius:30px;
  padding:10px 20px;
}

.modal-content {
  background:#0b1224;
  color:#fff;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark">
<div class="container">
<span class="navbar-brand fw-bold">KandelTech</span>
<button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#authModal">Login</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>We Build Scalable Digital Solutions</h1>
<p>Web • Cloud • Software</p>
</div>
</section>

<!-- SERVICES -->
<section class="section text-center">
<div class="container">
<h2>Services</h2>
<div class="row mt-4">
<div class="col-md-4"><div class="glass">Web Development</div></div>
<div class="col-md-4"><div class="glass">Cloud Solutions</div></div>
<div class="col-md-4"><div class="glass">Custom Software</div></div>
</div>
</div>
</section>

<!-- CONTACT -->
<section class="section text-center">
<div class="container">
<h2>Contact</h2>

<form id="contactForm">
<input name="name" class="form-control mb-2" placeholder="Name" required>
<input name="email" class="form-control mb-2" placeholder="Email" required>
<textarea name="message" class="form-control mb-3" placeholder="Message" required></textarea>
<button class="btn btn-main">Send</button>
</form>

<p id="formMsg"></p>

</div>
</section>

<footer class="text-center p-3">© 2026 Kandel Tech</footer>

<!-- LOGIN MODAL -->
<div class="modal fade" id="authModal">
<div class="modal-dialog">
<div class="modal-content p-4">

<h4 class="text-center">Client Login</h4>

<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button onclick="signup()" class="btn btn-main w-100 mb-2">Create Account</button>
<button onclick="login()" class="btn btn-warning w-100 mb-2">Login</button>
<button onclick="googleLogin()" class="btn btn-light w-100">Google Login</button>

<p id="authMsg" class="mt-2 text-danger text-center"></p>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  sendEmailVerification,
  updateProfile
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJaZpIoH-eRXYQeoOOuT-EF4KUVBXMN_I",
  authDomain: "kandel-tech.firebaseapp.com",
  projectId: "kandel-tech",
  storageBucket: "kandel-tech.firebasestorage.app",
  messagingSenderId: "578685445781",
  appId: "1:578685445781:web:6d8be75c8cfd16e88b9d9c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("authMsg");

// SIGNUP
window.signup = async () => {
  try {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const user = await createUserWithEmailAndPassword(auth,email,password);
    await updateProfile(user.user,{displayName:name});
    await sendEmailVerification(user.user);

    msg.innerText = "Check your email to verify account.";
  } catch(e){ msg.innerText = e.message; }
};

// LOGIN
window.login = async () => {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const user = await signInWithEmailAndPassword(auth,email,password);

    if(!user.user.emailVerified){
      msg.innerText="Verify email first.";
      return;
    }

    msg.innerText="Login successful.";
  } catch(e){ msg.innerText=e.message; }
};

// GOOGLE LOGIN
window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    msg.innerText="Google login success.";
  } catch(e){ msg.innerText=e.message; }
};

// FORM
document.getElementById("contactForm").addEventListener("submit", async e=>{
  e.preventDefault();

  if(!auth.currentUser){
    alert("Login required");
    return;
  }

  await fetch("https://formspree.io/f/mnjlkrwy",{
    method:"POST",
    body:new FormData(e.target),
    headers:{'Accept':'application/json'}
  });

  document.getElementById("formMsg").innerText="Message sent!";
});
</script>

</body>
</html>
